name: Prisma Migrate

on:
  push:
    branches: ["main"]
    paths:
      - "backend/prisma/**"
      - "backend/package.json"
      - "backend/package-lock.json"
      - ".github/workflows/prisma-migrate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DIRECT_URL: ${{ secrets.MIGRATE_URL }}
      DATABASE_URL: ${{ secrets.MIGRATE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Debug DB URL (safe)
        run: |
          node -e "const u=new URL(process.env.DATABASE_URL); console.log('user=',u.username,'host=',u.host,'db=',u.pathname)"

      - name: Prisma migrate deploy (direct)
        run: npx prisma migrate deploy

      - name: Prisma generate
        run: npx prisma generate